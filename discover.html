<style>
:root{
  --void:#FFFFFF;
  --panel:#FFF6ED;
  --panel-2:#FFFFFF;
  --panel-3:#FFEBD8;
  --cyan:#E87815;
  --cyan-dim:#B85C0E;
  --violet:#FFA85C;
  --text:#2B1D12;
  --muted:#8A7563;
  --muted-2:#AD9885;
  --line:rgba(184,92,14,.16);
  --line-2:rgba(184,92,14,.30);
  --good:#2FA86B;
  --radius:3px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'IBM Plex Sans Thai','Chakra Petch',sans-serif;
  background:var(--void);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
img,svg{display:block;max-width:100%;}
.mono{font-family:'JetBrains Mono',monospace;}
.disp{font-family:'Chakra Petch',sans-serif;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important;}
}

/* ---------- utility panel frame ---------- */
.hud{position:relative;border:1px solid var(--line-2);background:var(--panel);}
.hud::before,.hud::after{
  content:"";position:absolute;width:10px;height:10px;
  border:1.5px solid var(--cyan);opacity:.7;pointer-events:none;
}
.hud::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
.hud::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}

/* ---------- NAV ---------- */
header.site{
  position:sticky;top:0;z-index:200;
  background:rgba(255,255,255,.88);
  border-bottom:1px solid var(--line);
}
header.site::before{
  content:"";position:absolute;inset:0;z-index:-1;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.nav-wrap{max-width:1280px;margin:0 auto;padding:0 28px;height:68px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-mark{
  width:34px;height:34px;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14.5px;color:var(--cyan);
  border:1px solid var(--cyan);flex:none;
  box-shadow:0 0 14px rgba(232,120,21,.20) inset, 0 0 10px rgba(232,120,21,.12);
}
.brand-logo{height:40px;width:40px;flex:none;border-radius:50%;object-fit:cover;}
.brand-name b{display:block;font-family:'Chakra Petch',sans-serif;font-size:16.5px;font-weight:600;letter-spacing:.01em;}
.brand-name span{display:block;font-size:12px;color:var(--muted-2);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;}
nav.main-nav{display:flex;align-items:center;gap:2px;}
nav.main-nav a{color:#6B5847;font-size:15px;padding:9px 14px;border-radius:var(--radius);transition:color .2s,background .2s;}
nav.main-nav a:hover{color:#2B1D12;background:rgba(232,120,21,.08);}
.nav-item{position:relative;}
.nav-item.has-dropdown{display:flex;align-items:center;}
.dropdown-menu{
  position:absolute;top:100%;left:0;min-width:200px;background:var(--panel-2);
  border:1px solid var(--line-2);padding:6px;display:none;flex-direction:column;gap:2px;
  box-shadow:0 20px 40px rgba(0,0,0,.5);z-index:50;
}
.nav-item.has-dropdown:hover .dropdown-menu,.nav-item.has-dropdown:focus-within .dropdown-menu{display:flex;}
.dropdown-menu a{padding:10px 12px;font-size:14.5px;white-space:nowrap;border-radius:var(--radius);}
.dropdown-menu a:hover{background:rgba(232,120,21,.1);}
.dropdown-menu.mega{min-width:660px;grid-template-columns:repeat(4,1fr);gap:2px 22px;padding:14px;}
.nav-item.has-dropdown:hover .dropdown-menu.mega,.nav-item.has-dropdown:focus-within .dropdown-menu.mega{display:grid;}
.dropdown-group{display:flex;flex-direction:column;gap:1px;}
.dropdown-group-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--cyan);text-transform:uppercase;padding:8px 12px 4px;}
.nav-cta{
  font-family:'JetBrains Mono',monospace;font-size:13.5px;letter-spacing:.03em;
  border:1px solid var(--cyan);color:var(--cyan) !important;padding:8px 15px !important;
}
.nav-cta:hover{background:var(--cyan) !important;color:#fff !important;box-shadow:0 0 20px rgba(232,120,21,.35);}
.nav-toggle{display:none;background:none;border:1px solid var(--line-2);width:38px;height:38px;color:var(--text);font-size:18.5px;cursor:pointer;}

/* ---------- HERO ---------- */
.hero{position:relative;padding:100px 28px 72px;overflow:hidden;}
.hero-bg{position:absolute;inset:0;z-index:0;}
.hero-bg::before{
  content:"";position:absolute;inset:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(ellipse 70% 60% at 50% 20%,#000 20%,transparent 75%);
}
.glow-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.22;}
.glow-orb.c{width:420px;height:420px;background:var(--cyan);top:-140px;left:8%;}
.glow-orb.v{width:380px;height:380px;background:var(--violet);top:-40px;right:6%;opacity:.16;}
.hero-inner{max-width:1280px;margin:0 auto;position:relative;z-index:2;}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:13.5px;color:var(--cyan);
  letter-spacing:.15em;text-transform:uppercase;display:inline-flex;align-items:center;gap:9px;
  margin-bottom:24px;padding:6px 12px 6px 8px;border:1px solid var(--line-2);border-radius:20px;
}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
h1.hero-title{
  font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:clamp(32px,4.8vw,58px);
  line-height:1.1;letter-spacing:-.01em;max-width:840px;
}
h1.hero-title .grad{background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-sub{margin-top:22px;max-width:600px;font-size:18px;line-height:1.75;color:var(--muted);font-weight:300;}
.hero-cta-row{display:flex;gap:14px;margin-top:36px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;font-size:16px;font-weight:500;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:transform .15s,box-shadow .2s,background .2s,border-color .2s,color .2s;font-family:'IBM Plex Sans Thai',sans-serif;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:linear-gradient(90deg,var(--cyan),var(--violet));color:#2B1D12;font-weight:600;}
.btn-primary:hover{box-shadow:0 0 26px rgba(232,120,21,.35);}
.btn-ghost{border-color:var(--line-2);color:var(--text);}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);}

/* status readout strip */
.readout{margin-top:64px;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);}
.readout-item{background:var(--panel);padding:20px 22px;}
.readout-item b{display:block;font-family:'Chakra Petch',sans-serif;fon
